  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="120">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">

</head>
<body>

<header style="position:relative">
  <img class="logo" src="masters_pool_logo.png" alt="Masters Pool Logo">
  <div class="site-title">Masters Pool</div>

  <a href="costs.html" class="active">Golfer Costs</a>

<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Golfer Costs</div>
    </div>
    <table id="golferCosts"></table>
  </div>
</div>

<script src="shared.js"></script>
<script>
function formatMoney(value) {
  const raw = value?.toString().replace(/[^\d.-]/g, '');
  const num = parseFloat(raw);
  return !isNaN(num) ? '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : value;
}

function loadTSV(url, tableId, moneyColumnNames = []) {
  return fetch(url)
    .then(response => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.text();
    })
    .then(data => {
      const rows = data.trim().split('\n').map(r => r.split('\t'));
      const headers = rows[0];
      const moneyIndices = headers.map((h, i) => moneyColumnNames.some(name => h.trim().toLowerCase().includes(name.toLowerCase())) ? i : -1).filter(i => i !== -1);
      const table = document.getElementById(tableId);
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.innerHTML = '';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.slice(1).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, j) => {
          const td = document.createElement('td');
          td.textContent = moneyIndices.includes(j) ? formatMoney(cell) : cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    });
}

const costsUrl = "/api/sheet?url=" + encodeURIComponent("https://docs.google.com/spreadsheets/d/e/2PACX-1vT_htvNiJZPFTNohWOu_fT0VjKlQQWfMFEi08SU1tlN3HHauBbe-I5O3KPbwc-WPkBR8Hdh5yEMssOl/pub?gid=258241386&single=true&output=tsv");
loadTSV(costsUrl, 'golferCosts', ['cost', 'price', 'amount']).catch(() => {});
</script>
</body>
</html>
