<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="120">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Pool — Golfer Costs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080d14;
      --surface: #0f1923;
      --surface2: #162032;
      --border: #1e3352;
      --gold: #c9a84c;
      --text: #dde4ef;
      --text-muted: #5a7186;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Barlow', 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }

    header {
      background-image: linear-gradient(to bottom, rgba(8,13,20,0.50) 0%, rgba(8,13,20,0.88) 100%),
        url('https://golf.com/wp-content/uploads/2022/03/augusta-national-scenic-1024x576.jpg');
      background-size: cover;
      background-position: center 50%;
      padding: 32px 20px 22px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }
    .logo { height: 56px; }
    .site-title {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--gold);
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.9);
    }

    nav {
      background: var(--surface);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0;
      border-bottom: 1px solid var(--border);
    }
    nav a {
      color: var(--text-muted);
      padding: 14px 20px;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--gold); border-bottom-color: var(--gold); }

    .container { max-width: 1300px; margin: auto; padding: 24px 20px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .card-header {
      background: var(--surface2);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: var(--surface2);
      color: var(--gold);
      padding: 10px 12px;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(30,50,82,0.5); }
  </style>
</head>
<body>

<header>
  <img class="logo" src="masters_pool_logo.png" alt="Masters Pool Logo">
  <div class="site-title">Masters Pool</div>
</header>

<nav>
  <a href="index.html">Live Leaderboard</a>
  <a href="detailed.html">Detailed Leaderboard</a>
  <a href="costs.html" class="active">Golfer Costs</a>
  <a href="prizes.html">Prize Money</a>
  <a href="payouts.html">Pool Payouts</a>
</nav>

<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Golfer Costs</div>
    </div>
    <table id="golferCosts"></table>
  </div>
</div>

<script>
function formatMoney(value) {
  const raw = value?.toString().replace(/[^\d.-]/g, '');
  const num = parseFloat(raw);
  return !isNaN(num) ? '$' + Math.round(num).toLocaleString('en-US') : value;
}

function loadTSV(url, tableId, moneyColumnNames = []) {
  return fetch(url)
    .then(response => response.text())
    .then(data => {
      const rows = data.trim().split('\n').map(r => r.split('\t'));
      const headers = rows[0];
      const moneyIndices = headers.map((h, i) => moneyColumnNames.some(name => h.trim().toLowerCase().includes(name.toLowerCase())) ? i : -1).filter(i => i !== -1);
      const table = document.getElementById(tableId);
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.innerHTML = '';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.slice(1).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, j) => {
          const td = document.createElement('td');
          td.textContent = moneyIndices.includes(j) ? formatMoney(cell) : cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    });
}

const costsUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_htvNiJZPFTNohWOu_fT0VjKlQQWfMFEi08SU1tlN3HHauBbe-I5O3KPbwc-WPkBR8Hdh5yEMssOl/pub?gid=258241386&single=true&output=tsv";
loadTSV(costsUrl, 'golferCosts', ['cost', 'price', 'amount']);
</script>
</body>
</html>
