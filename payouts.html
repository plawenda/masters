<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="120">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Pool — Pool Payouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3efe4;
      --surface: #fefcf8;
      --surface2: #e8e2d6;
      --border: #d8d2c4;
      --green: #006747;
      --green-dim: rgba(0,103,71,0.06);
      --gold: #c8952a;
      --text: #1a1510;
      --text-muted: #6b6255;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    header {
      background: var(--green);
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 8px
        ),
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(255,255,255,0.09) 0%, transparent 100%),
        linear-gradient(to bottom, #006040 0%, #003d28 100%);
      padding: 24px 20px 20px;
      text-align: center;
      border-bottom: 3px solid var(--gold);
      position: relative;
    }
    .logo { height: 140px; }
    .site-title {
      font-family: 'Playfair Display', serif;
      color: #ffffff;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-top: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 48px rgba(200,149,42,0.18);
    }
    .site-subtitle {
      font-family: 'DM Sans', sans-serif;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    nav {
      background: var(--surface);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    nav a {
      color: var(--text-muted);
      padding: 14px 18px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover { color: var(--green); }
    nav a.active { color: var(--green); border-bottom-color: var(--green); }

    .dispatch-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 24px;
    }
    .dispatch-label-inline {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .dispatch-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
      max-width: 800px;
    }
    .intro-shimmer {
      display: inline-block;
      width: min(480px, 70vw);
      height: 14px;
      background: linear-gradient(90deg, var(--border) 25%, var(--surface2) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      vertical-align: middle;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }


    .hamburger {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 13px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    @media (max-width: 600px) {
      .logo { height: 80px; }
      header { padding: 16px 20px 14px; }
      .site-title { font-size: 26px; }
      .site-subtitle { font-size: 13px; letter-spacing: 2px; }
      .dispatch-strip { padding: 8px 16px; gap: 6px; }
      .dispatch-label-inline { display: none; }
      .dispatch-text { font-size: 14px; }
      nav { flex-direction: column; align-items: stretch; }
      .hamburger { display: flex; }
      nav a { display: none; }
      nav.open a { display: flex; padding: 13px 20px; font-size: 15px; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); border-left: none; width: 100%; }
      nav.open a.active { border-left: 3px solid var(--green); padding-left: 17px; }
    }

    .container { max-width: 600px; margin: auto; padding: 24px 20px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }
    .card-header {
      background: var(--green);
      padding: 12px 16px;
    }
    .card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }

    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    thead th {
      background: #004232;
      color: rgba(255,255,255,0.72);
      padding: 9px 12px;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 2px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s ease; }
    tbody tr:hover { background: rgba(0,103,71,0.09); }
  </style>
</head>
<body>

<header>
  <img class="logo" src="masters_pool_logo.png" alt="Masters Pool Logo">
  <div class="site-title">Masters Pool</div>
  
  <div class="site-subtitle">Augusta National · <span id="year"></span></div>
</header>

<nav>
  <button class="hamburger" id="menuBtn" aria-label="Toggle menu">&#9776; Menu</button>
  <a href="index.html">Live Leaderboard</a>
  <a href="detailed.html">Detailed Leaderboard</a>
  <a href="costs.html">Golfer Costs</a>
  <a href="prizes.html">Prize Money</a>
  <a href="payouts.html" class="active">Pool Payouts</a>
  <a href="winners.html">Champions</a>
  <a href="rules.html">Rules</a>
</nav>

<div class="dispatch-strip" id="dispatch">
  <span class="dispatch-label-inline">Dispatch</span>
  <span class="dispatch-text" id="introUpdate"><span class="intro-shimmer"></span></span>
</div>

<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Pool Payouts</div>
    </div>
    <table id="payoutsTable"></table>
  </div>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();
// Load AI intro
fetch('/api/intro')
  .then(r => r.json())
  .then(d => {
    if (d.intro) {
      document.getElementById('introUpdate').textContent = d.intro;
    } else {
      document.getElementById('dispatch').style.display = 'none';
    }
  })
  .catch(() => { document.getElementById('dispatch').style.display = 'none'; });

function loadTSV(url, tableId) {
  return fetch(url)
    .then(response => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.text();
    })
    .then(data => {
      const rows = data.trim().split('\n').map(r => r.split('\t'));
      const headers = rows[0];
      const table = document.getElementById(tableId);
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.innerHTML = '';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.slice(1).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, j) => {
          const td = document.createElement('td');
          if (j === 1) {
            const val = parseFloat(cell);
            td.textContent = isNaN(val) ? cell : `${val.toFixed(1)}%`;
          } else {
            td.textContent = cell;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    });
}

const payoutsUrl = "/api/sheet?url=" + encodeURIComponent("https://docs.google.com/spreadsheets/d/e/2PACX-1vT_htvNiJZPFTNohWOu_fT0VjKlQQWfMFEi08SU1tlN3HHauBbe-I5O3KPbwc-WPkBR8Hdh5yEMssOl/pub?gid=1012228973&single=true&output=tsv");
loadTSV(payoutsUrl, 'payoutsTable').catch(() => {});

// Hamburger menu
const menuBtn = document.getElementById('menuBtn');
const navEl = document.querySelector('nav');
menuBtn.addEventListener('click', e => { e.stopPropagation(); navEl.classList.toggle('open'); });
document.addEventListener('click', e => {
  if (!navEl.contains(e.target) && e.target !== menuBtn) navEl.classList.remove('open');
});
</script>
</body>
</html>
