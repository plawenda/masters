  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="shared.css">
  <style>
    .container { max-width: 600px; margin: auto; padding: 24px 20px; }
  </style>
</head>
<body>

<header style="position:relative">
  <img class="logo" src="masters_pool_logo.png" alt="Masters Pool Logo">
  <div class="site-title">Masters Pool</div>
  
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><span id="themeIcon">☀</span> <span id="themeLabel">Light</span></button>
  <div class="site-subtitle">Augusta National · <span id="year"></span></div>

<nav>
  <button class="hamburger" id="menuBtn" aria-label="Toggle menu">&#9776; Menu</button>

<div class="container">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Pool Payouts</div>
    </div>
    <table id="payoutsTable"></table>
  </div>
</div>

<script src="shared.js"></script>
<script>
function loadTSV(url, tableId) {
  return fetch(url)
    .then(response => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.text();
    })
    .then(data => {
      const rows = data.trim().split('\n').map(r => r.split('\t'));
      const headers = rows[0];
      const table = document.getElementById(tableId);
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.innerHTML = '';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.slice(1).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, j) => {
          const td = document.createElement('td');
          if (j === 1) {
            const val = parseFloat(cell);
            td.textContent = isNaN(val) ? cell : `${val.toFixed(1)}%`;
          } else {
            td.textContent = cell;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    });
}

const payoutsUrl = "/api/sheet?url=" + encodeURIComponent("https://docs.google.com/spreadsheets/d/e/2PACX-1vT_htvNiJZPFTNohWOu_fT0VjKlQQWfMFEi08SU1tlN3HHauBbe-I5O3KPbwc-WPkBR8Hdh5yEMssOl/pub?gid=1012228973&single=true&output=tsv");
loadTSV(payoutsUrl, 'payoutsTable').catch(() => {});
</script>
</body>
</html>
