<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Pool — Detailed Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
  <style>
    :root {
      --bg: #080d14;
      --surface: #0f1923;
      --surface2: #162032;
      --border: #1e3352;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --green: #00875a;
      --text: #dde4ef;
      --text-muted: #5a7186;
      --highlight: rgba(201,168,76,0.10);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Barlow', 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }

    header {
      background-image: linear-gradient(to bottom, rgba(8,13,20,0.50) 0%, rgba(8,13,20,0.88) 100%),
        url('https://golf.com/wp-content/uploads/2022/03/augusta-national-scenic-1024x576.jpg');
      background-size: cover;
      background-position: center 50%;
      padding: 32px 20px 22px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }
    .logo { height: 56px; }
    .site-title {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--gold);
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.9);
    }

    nav {
      background: var(--surface);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0;
      border-bottom: 1px solid var(--border);
    }
    nav a {
      color: var(--text-muted);
      padding: 14px 20px;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--gold); border-bottom-color: var(--gold); }

    .container { max-width: 1300px; margin: auto; padding: 24px 20px; }

    .selector-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 20px;
    }
    .selector-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Choices.js dark overrides */
    .choices { margin: 0; }
    .choices__inner {
      background: var(--surface2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      padding: 5px 8px !important;
      min-height: 42px !important;
    }
    .choices__input {
      background: transparent !important;
      color: var(--text) !important;
      font-family: 'Barlow', sans-serif !important;
      font-size: 14px !important;
    }
    .choices__input::placeholder { color: var(--text-muted) !important; }
    .choices__list--multiple .choices__item {
      background: var(--gold) !important;
      border-color: #a88a3a !important;
      color: #080d14 !important;
      font-family: 'Barlow Condensed', sans-serif !important;
      font-weight: 700 !important;
      font-size: 13px !important;
      border-radius: 4px !important;
    }
    .choices__list--dropdown {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      z-index: 100 !important;
    }
    .choices__list--dropdown .choices__item { color: var(--text) !important; font-family: 'Barlow', sans-serif !important; }
    .choices__list--dropdown .choices__item--selectable.is-highlighted { background: var(--surface2) !important; color: var(--gold) !important; }
    .choices__list--dropdown .choices__input { background: var(--surface2) !important; border-bottom: 1px solid var(--border) !important; color: var(--text) !important; }
    .choices__placeholder { color: var(--text-muted) !important; }
    .choices__list[aria-expanded] { z-index: 100 !important; }

    #teamSummary {
      background: var(--surface);
      border: 1px solid var(--gold);
      border-radius: 8px;
      margin: 0 0 20px;
      overflow-x: auto;
      display: none;
    }
    #teamSummary table { margin: 0; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .card-header {
      background: var(--surface2);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
      flex: 1;
    }
    .live-badge {
      background: var(--green);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: var(--surface2);
      color: var(--gold);
      padding: 10px 12px;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(30,50,82,0.5); }
    tbody tr.highlight { background: var(--highlight) !important; }
    tbody tr.highlight td:first-child { border-left: 3px solid var(--gold); padding-left: 9px; }

    .move-up   { color: #22c55e; font-size: 9px; margin-left: 5px; vertical-align: middle; font-weight: 700; letter-spacing: 0; }
    .move-down { color: #ef4444; font-size: 9px; margin-left: 5px; vertical-align: middle; font-weight: 700; letter-spacing: 0; }
  </style>
</head>
<body>

<header>
  <img class="logo" src="masters_pool_logo.png" alt="Masters Pool Logo" />
  <div class="site-title">Masters Pool</div>
</header>

<nav>
  <a href="index.html">Live Leaderboard</a>
  <a href="detailed.html" class="active">Detailed Leaderboard</a>
  <a href="costs.html">Golfer Costs</a>
  <a href="prizes.html">Prize Money</a>
  <a href="payouts.html">Pool Payouts</a>
</nav>

<div class="container">
  <div class="selector-card">
    <div class="selector-label">Select Your Teams</div>
    <select id="teamSelect" multiple></select>
  </div>

  <div id="teamSummary"></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Detailed Leaderboard</span>
      <span class="live-badge">Live</span>
    </div>
    <table id="ourLeaderboard"></table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script>
function formatMoney(value) {
  const raw = value?.toString().replace(/[^\d.-]/g, '');
  const num = parseFloat(raw);
  return !isNaN(num) ? '$' + Math.round(num).toLocaleString('en-US') : value;
}

function loadTSV(url, tableId, moneyColumnNames = []) {
  return fetch(url)
    .then(response => response.text())
    .then(data => {
      const rows = data.trim().split('\n').map(r => r.split('\t'));
      const headers = rows[0];
      const moneyIndices = headers.map((h, i) => moneyColumnNames.some(name => h.trim().toLowerCase().includes(name.toLowerCase())) ? i : -1).filter(i => i !== -1);
      const table = document.getElementById(tableId);
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.innerHTML = '';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.slice(1).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach((cell, j) => {
          const td = document.createElement('td');
          td.textContent = moneyIndices.includes(j) ? formatMoney(cell) : cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      return { headers, rows: rows.slice(1) };
    });
}

function getStoredPositions(key) {
  try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; }
}

function applyMovementIndicators(tableId, rows, nameColIndex, storageKey) {
  const prev = getStoredPositions(storageKey);
  const current = {};
  const tbody = document.querySelector('#' + tableId + ' tbody');
  if (!tbody) return;
  tbody.querySelectorAll('tr').forEach(function(tr, i) {
    const name = rows[i] && rows[i][nameColIndex];
    if (!name) return;
    current[name] = i;
    if (!(name in prev)) return;
    const diff = prev[name] - i;
    if (diff === 0) return;
    const span = document.createElement('span');
    span.className = diff > 0 ? 'move-up' : 'move-down';
    span.title = (diff > 0 ? 'Up ' : 'Down ') + Math.abs(diff) + ' place' + (Math.abs(diff) > 1 ? 's' : '');
    span.textContent = diff > 0 ? ' ▲' : ' ▼';
    const firstTd = tr.querySelector('td');
    if (firstTd) firstTd.appendChild(span);
  });
  localStorage.setItem(storageKey, JSON.stringify(current));
}

const detailedUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_htvNiJZPFTNohWOu_fT0VjKlQQWfMFEi08SU1tlN3HHauBbe-I5O3KPbwc-WPkBR8Hdh5yEMssOl/pub?gid=1898026908&single=true&output=tsv";

let teamHeaders = [], teamRows = [];
loadTSV(detailedUrl, 'ourLeaderboard').then(data => {
  teamHeaders = data.headers;
  teamRows = data.rows;
  applyMovementIndicators('ourLeaderboard', teamRows, 1, 'detailedLB_positions');

  const teamSelect = document.getElementById('teamSelect');
  const summaryDiv = document.getElementById('teamSummary');
  const teamList = teamRows.map((r, i) => ({ name: r[1], index: i, data: r })).sort((a, b) => a.name.localeCompare(b.name));

  teamList.forEach(team => {
    const opt = document.createElement('option');
    opt.value = team.name;
    opt.textContent = team.name;
    teamSelect.appendChild(opt);
  });

  const choices = new Choices(teamSelect, {
    removeItemButton: true,
    searchPlaceholderValue: 'Search teams...',
    allowHTML: false,
    searchEnabled: true,
    renderChoiceLimit: -1,
    itemSelectText: '',
    position: 'auto'
  });

  function updateSummary(names) {
    if (!names.length) return summaryDiv.style.display = 'none';
    let html = '<table><thead><tr>';
    teamHeaders.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    names.forEach(name => {
      const match = teamRows.find(r => r[1] === name);
      if (match) {
        html += '<tr>';
        match.forEach((cell, i) => {
          const header = teamHeaders[i];
          html += `<td>${header.toLowerCase().includes('earn') ? formatMoney(cell) : cell}</td>`;
        });
        html += '</tr>';
      }
    });
    html += '</tbody></table>';
    summaryDiv.innerHTML = html;
    summaryDiv.style.display = 'block';
  }

  const savedNames = JSON.parse(localStorage.getItem('selectedDetailedTeamNames') || '[]');
  savedNames.forEach(name => choices.setChoiceByValue(name));
  document.querySelectorAll("#ourLeaderboard tbody tr").forEach((r, i) => {
    const teamName = teamRows[i][1];
    if (savedNames.includes(teamName)) r.classList.add("highlight");
  });
  updateSummary(savedNames);

  teamSelect.addEventListener("change", function () {
    const selected = Array.from(this.selectedOptions).map(o => o.value);
    localStorage.setItem('selectedDetailedTeamNames', JSON.stringify(selected));
    document.querySelectorAll("#ourLeaderboard tbody tr").forEach((r, i) => {
      r.classList.toggle("highlight", selected.includes(teamRows[i][1]));
    });
    updateSummary(selected);
  });
});
</script>
</body>
</html>
