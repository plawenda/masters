[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[[redirects]]
  from = "/api/intro"
  to = "/.netlify/functions/intro"
  status = 200

[[redirects]]
  from = "/api/sheet"
  to = "/.netlify/functions/sheet"
  status = 200

[[redirects]]
  from = "/api/leaderboard"
  to = "/.netlify/functions/leaderboard"
  status = 200

[[edge_functions]]
  path = "/*"
  function = "auth"

[[redirects]]
  from = "/api/auth-login"
  to = "/.netlify/functions/auth-login"
  status = 200

[functions."leaderboard-snapshot"]
  schedule = "*/15 * * * *"
